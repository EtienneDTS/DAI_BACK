spring.datasource.url=jdbc:mysql://pg-dbv2.cr0042wq81w6.eu-west-1.rds.amazonaws.com:3306/PickAndGoV2
spring.datasource.username=admin
spring.datasource.password=projetpg2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# HikariCP configuration (pool de connexions par défaut de Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Configuration de l'application
server.port=8081

spring.mvc.cors.mappings.[/**].allowed-origins=http://localhost:5173
spring.mvc.cors.mappings.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.mappings.[/**].allowed-headers=*
spring.mvc.cors.mappings.[/**].allow-credentials=true